[project]
name = "m3cv-dataprep"
version = "1.0.0"
description = "DICOM data preparation for machine learning - converts radiotherapy data to HDF5"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "h5py>=3.15.1",
    "numpy>=2.2.6",
    "opencv-python>=4.12.0.88",
    "pandas>=2.3.3",
    "pydicom>=3.0.1",
    "scipy>=1.16.2",
    "typer>=0.19.2",
]

[project.scripts]
m3cv-prep = "m3cv_prep.cli:main"

[dependency-groups]
dev = [
    "pytest>=8.4.2",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/m3cv_prep"]
